<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1980" font-family="Inter, system-ui, Arial, sans-serif">
  <defs>
    <style><![CDATA[
      .bg { fill: #faf7f2; }
      .title { font-family: Georgia, "Playfair Display", serif; font-size: 30px; fill: #3d3833; }
      .subtitle { font-size: 18px; font-weight: 600; fill: #3d3833; letter-spacing: 1px; }
      .area-label { font-style: italic; fill: #6b8780; font-size: 16px; }
      .room { stroke: #3d3833; stroke-width: 1.5; }
      .outline { fill: none; stroke: #3d3833; stroke-width: 3; }
      .label { fill: #3d3833; font-size: 13px; text-anchor: middle; }
      .label-bold { font-weight: 600; }
      .label-sub { font-size: 10px; fill: #5a534b; }
      .door { stroke: #c9a9a6; stroke-width: 4; fill: none; stroke-linecap: round; }
      .stair-line { stroke: #3d3833; stroke-width: 0.7; }
      .compass-circle { fill: white; stroke: #3d3833; stroke-width: 1.2; }
      .compass-text { font-size: 11px; font-weight: 600; text-anchor: middle; fill: #3d3833; }
      .legend-text { font-size: 12px; fill: #3d3833; }
      .legend-title { font-size: 13px; font-weight: 600; fill: #3d3833; }
      /* Room types */
      .bedroom { fill: #ead6ce; }
      .common { fill: #cfe0d4; }
      .service { fill: #d8e1ec; }
      .bar { fill: #ecd9b7; }
      .sauna { fill: #e8c5a7; }
      .corridor { fill: #ece5d6; }
      .stair { fill: #c5bdac; }
    ]]></style>

    <!-- Spiral staircase symbol -->
    <symbol id="spiral-stair" viewBox="-20 -20 40 40">
      <circle r="18" class="room stair"/>
      <line x1="0" y1="0" x2="0" y2="-18" class="stair-line"/>
      <line x1="0" y1="0" x2="14" y2="-12" class="stair-line"/>
      <line x1="0" y1="0" x2="18" y2="0" class="stair-line"/>
      <line x1="0" y1="0" x2="14" y2="12" class="stair-line"/>
      <line x1="0" y1="0" x2="0" y2="18" class="stair-line"/>
      <line x1="0" y1="0" x2="-14" y2="12" class="stair-line"/>
      <line x1="0" y1="0" x2="-18" y2="0" class="stair-line"/>
      <line x1="0" y1="0" x2="-14" y2="-12" class="stair-line"/>
      <text y="3" text-anchor="middle" font-size="11" font-weight="600">↑</text>
    </symbol>

    <!-- Straight staircase symbol -->
    <symbol id="straight-stair" viewBox="0 0 40 60">
      <rect width="40" height="60" class="room stair"/>
      <line x1="0" y1="10" x2="40" y2="10" class="stair-line"/>
      <line x1="0" y1="20" x2="40" y2="20" class="stair-line"/>
      <line x1="0" y1="30" x2="40" y2="30" class="stair-line"/>
      <line x1="0" y1="40" x2="40" y2="40" class="stair-line"/>
      <line x1="0" y1="50" x2="40" y2="50" class="stair-line"/>
      <text x="20" y="35" text-anchor="middle" font-size="14" font-weight="600">↑</text>
    </symbol>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="1980"/>

  <!-- Header -->
  <text class="title" x="600" y="55" text-anchor="middle">Resort Počepice — plánek</text>
  <text x="600" y="82" text-anchor="middle" font-style="italic" fill="#87a396" font-size="14">konečně-ano.cz</text>

  <!-- ============================================ -->
  <!-- FLOOR 1 — PŘÍZEMÍ                            -->
  <!-- ============================================ -->
  <g transform="translate(0, 110)">
    <text class="subtitle" x="600" y="22" text-anchor="middle">PŘÍZEMÍ (1. NP)</text>

    <!-- Compass -->
    <g transform="translate(1080, 60)">
      <circle r="22" class="compass-circle"/>
      <text class="compass-text" y="-9">S</text>
      <text class="compass-text" y="18">J</text>
      <text class="compass-text" x="-12" y="4">Z</text>
      <text class="compass-text" x="12" y="4">V</text>
      <text class="compass-text" y="3" font-size="9" fill="#c9a9a6">✦</text>
    </g>

    <!-- Plan -->
    <g transform="translate(170, 40)">

      <!-- Outdoor labels -->
      <text class="area-label" x="330" y="240" text-anchor="middle">Vnitřní dvůr</text>
      <text class="area-label" x="430" y="710" text-anchor="middle">Přední zahrada</text>

      <!-- L-shape building outline -->
      <path class="outline" d="M 80,350 L 80,650 L 780,650 L 780,100 L 580,100 L 580,350 Z"/>

      <!-- ============================ -->
      <!-- LONG ARM — WEST SIDE         -->
      <!-- ============================ -->

      <!-- Stair shaft (3rd stair, NW corner, exits to courtyard) -->
      <rect class="room stair" x="80" y="350" width="50" height="160"/>
      <use href="#straight-stair" x="85" y="395" width="40" height="60"/>
      <text class="label label-sub" x="105" y="378" transform="rotate(-90, 105, 378)">↓ do dvora</text>

      <!-- Barrier-free bedroom (accessible from courtyard) -->
      <rect class="room bedroom" x="130" y="350" width="110" height="160"/>
      <text class="label label-bold" x="185" y="420">Bezbariérová</text>
      <text class="label label-bold" x="185" y="436">ložnice</text>
      <text class="label label-sub" x="185" y="455">♿ vstup ze dvora</text>

      <!-- GP apartment (passage room, barrier-free) -->
      <rect class="room bedroom" x="240" y="350" width="230" height="160"/>
      <line x1="355" y1="350" x2="355" y2="510" class="room" stroke-dasharray="4 3" stroke="#3d3833" stroke-width="1"/>
      <text class="label label-bold" x="297" y="420">Apartmá</text>
      <text class="label label-bold" x="297" y="436">prarodičů</text>
      <text class="label label-sub" x="297" y="453">♿ průchozí pokoj</text>
      <text class="label label-sub" x="412" y="430">ložnice</text>

      <!-- Newlywed apartment (full south of west wing, own door from corridor) -->
      <rect class="room bedroom" x="80" y="510" width="390" height="140"/>
      <text class="label label-bold" x="275" y="580">Novomanželské apartmá ✦</text>
      <text class="label label-sub" x="275" y="598">samostatný vstup z chodby</text>

      <!-- ============================ -->
      <!-- CORRIDOR (PRŮCHOD)           -->
      <!-- ============================ -->
      <rect class="room corridor" x="470" y="350" width="80" height="300"/>
      <text class="label label-bold" x="510" y="450" transform="rotate(-90, 510, 450)">Průchod</text>
      <use href="#straight-stair" x="488" y="555" width="40" height="60"/>
      <text class="label label-sub" x="510" y="650" text-anchor="middle">↑ patro</text>

      <!-- ============================ -->
      <!-- LONG ARM — EAST SIDE = SÁL   -->
      <!-- ============================ -->
      <rect class="room common" x="550" y="350" width="230" height="300"/>
      <text class="label label-bold" x="665" y="490" font-size="16">Stolovací</text>
      <text class="label label-bold" x="665" y="510" font-size="16">a taneční sál</text>
      <text class="label label-sub" x="665" y="530">celé pravé křídlo</text>

      <!-- ============================ -->
      <!-- SHORT ARM — KRÁTKÉ KŘÍDLO    -->
      <!-- ============================ -->

      <!-- Sauna (small, at the end / north tip) -->
      <rect class="room sauna" x="580" y="100" width="200" height="70"/>
      <text class="label label-bold" x="680" y="135">Sauna</text>
      <text class="label label-sub" x="680" y="152">→ vstup ze dvora</text>

      <!-- Bar (with spiral stair) -->
      <rect class="room bar" x="580" y="170" width="100" height="80"/>
      <text class="label label-bold" x="630" y="200">Bar</text>
      <text class="label label-sub" x="630" y="215">s výčepem</text>
      <use href="#spiral-stair" x="608" y="220" width="32" height="32"/>
      <text class="label label-sub" x="624" y="248">točité ↑</text>

      <!-- Jídelna (small dining) -->
      <rect class="room common" x="580" y="250" width="100" height="100"/>
      <text class="label label-bold" x="630" y="298">Jídelna</text>
      <text class="label label-sub" x="630" y="316">malá</text>

      <!-- Kitchen (alongside Jídelna+Bar) -->
      <rect class="room service" x="680" y="170" width="100" height="180"/>
      <text class="label label-bold" x="730" y="260">Kuchyň</text>

      <!-- Doors -->
      <!-- Front entrance (corridor → front yard) -->
      <line x1="490" y1="650" x2="530" y2="650" class="door"/>
      <text class="label label-sub" x="510" y="668" text-anchor="middle">vchod</text>
      <!-- Corridor → courtyard -->
      <line x1="490" y1="350" x2="530" y2="350" class="door"/>
      <!-- Sauna → courtyard (west wall of short arm) -->
      <line x1="580" y1="115" x2="580" y2="155" class="door"/>
      <!-- BB bedroom → courtyard -->
      <line x1="155" y1="350" x2="195" y2="350" class="door"/>
      <!-- Stair shaft → courtyard -->
      <line x1="90" y1="350" x2="120" y2="350" class="door"/>
      <!-- Sál → corridor -->
      <line x1="550" y1="475" x2="550" y2="525" class="door"/>
      <!-- Newlywed → corridor -->
      <line x1="470" y1="555" x2="470" y2="600" class="door"/>
      <!-- GP → corridor -->
      <line x1="470" y1="395" x2="470" y2="440" class="door"/>
      <!-- Sál → short arm (jídelna) -->
      <line x1="630" y1="350" x2="665" y2="350" class="door"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- FLOOR 2 — 1. PATRO                           -->
  <!-- ============================================ -->
  <g transform="translate(0, 1010)">
    <text class="subtitle" x="600" y="22" text-anchor="middle">1. PATRO (2. NP)</text>

    <!-- Compass -->
    <g transform="translate(1080, 60)">
      <circle r="22" class="compass-circle"/>
      <text class="compass-text" y="-9">S</text>
      <text class="compass-text" y="18">J</text>
      <text class="compass-text" x="-12" y="4">Z</text>
      <text class="compass-text" x="12" y="4">V</text>
      <text class="compass-text" y="3" font-size="9" fill="#c9a9a6">✦</text>
    </g>

    <g transform="translate(170, 40)">

      <text class="area-label" x="330" y="240" text-anchor="middle">Vnitřní dvůr</text>
      <text class="area-label" x="430" y="710" text-anchor="middle">Přední zahrada</text>

      <!-- L-shape building outline -->
      <path class="outline" d="M 80,350 L 80,650 L 780,650 L 780,100 L 580,100 L 580,350 Z"/>

      <!-- ============================ -->
      <!-- LONG ARM — WEST SIDE         -->
      <!-- 3 ložnice nad chodbou, chodba podél přední (jižní) stěny,
           schodiště na konci chodby (SZ roh)                       -->
      <!-- ============================ -->

      <!-- 3rd stair shaft (NW corner, descends to courtyard) -->
      <rect class="room stair" x="80" y="350" width="50" height="160"/>
      <use href="#straight-stair" x="85" y="395" width="40" height="60"/>
      <text class="label label-sub" x="105" y="378" transform="rotate(-90, 105, 378)">↓ do dvora</text>

      <!-- 3 bedrooms (north of west corridor, in a row) -->
      <rect class="room bedroom" x="130" y="350" width="113" height="230"/>
      <text class="label label-bold" x="186" y="450">Ložnice Z1</text>

      <rect class="room bedroom" x="243" y="350" width="113" height="230"/>
      <text class="label label-bold" x="299" y="450">Ložnice Z2</text>

      <rect class="room bedroom" x="356" y="350" width="114" height="230"/>
      <text class="label label-bold" x="413" y="450">Ložnice Z3</text>

      <!-- West corridor — along the front (south) wall -->
      <rect class="room corridor" x="80" y="580" width="390" height="70"/>
      <text class="label label-sub" x="280" y="618" text-anchor="middle">Chodba podél přední stěny → schodiště do dvora</text>

      <!-- Connector vertical between stair shaft and corridor (small) -->
      <rect class="room corridor" x="80" y="510" width="50" height="70"/>

      <!-- ============================ -->
      <!-- CENTRAL STAIR LANDING        -->
      <!-- (above 1NP průchod)          -->
      <!-- ============================ -->
      <rect class="room corridor" x="470" y="350" width="80" height="300"/>
      <use href="#straight-stair" x="488" y="555" width="40" height="60"/>
      <text class="label label-sub" x="510" y="450" text-anchor="middle">Chodba</text>
      <text class="label label-sub" x="510" y="465" text-anchor="middle">se schody</text>
      <text class="label label-sub" x="510" y="480" text-anchor="middle">z přízemí</text>

      <!-- ============================ -->
      <!-- LONG ARM — EAST SIDE         -->
      <!-- Dvě ložnice za sebou: V1 průchozí, V2 na konci -->
      <!-- ============================ -->

      <!-- Bedroom V1 (passage, closer to stairs) -->
      <rect class="room bedroom" x="550" y="350" width="115" height="300"/>
      <text class="label label-bold" x="608" y="490">Ložnice V1</text>
      <text class="label label-sub" x="608" y="508">průchozí</text>

      <!-- Bedroom V2 (at the end) -->
      <rect class="room bedroom" x="665" y="350" width="115" height="300"/>
      <text class="label label-bold" x="722" y="490">Ložnice V2</text>
      <text class="label label-sub" x="722" y="508">na konci</text>

      <!-- ============================ -->
      <!-- SHORT ARM — KRÁTKÉ KŘÍDLO    -->
      <!-- Apartmá + chodba se schody + apartmá (3 sekce) -->
      <!-- ============================ -->

      <!-- North apartment (at the tip / end) -->
      <rect class="room bedroom" x="580" y="100" width="200" height="70"/>
      <text class="label label-bold" x="680" y="130">Apartmá sever</text>
      <text class="label label-sub" x="680" y="148">v křídle</text>

      <!-- Middle corridor with spiral stair landing -->
      <rect class="room corridor" x="580" y="170" width="200" height="80"/>
      <text class="label label-sub" x="680" y="195" text-anchor="middle">Chodba</text>
      <text class="label label-sub" x="680" y="210" text-anchor="middle">v křídle</text>
      <use href="#spiral-stair" x="664" y="220" width="32" height="32"/>
      <text class="label label-sub" x="680" y="248" text-anchor="middle">↓ točité (z baru)</text>

      <!-- South apartment (closer to long arm) -->
      <rect class="room bedroom" x="580" y="250" width="200" height="100"/>
      <text class="label label-bold" x="680" y="300">Apartmá jih</text>
      <text class="label label-sub" x="680" y="318">v křídle</text>

      <!-- Doors -->
      <line x1="90" y1="350" x2="120" y2="350" class="door"/>
      <text class="label label-sub" x="105" y="343" text-anchor="middle">↓</text>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- LEGEND                                       -->
  <!-- ============================================ -->
  <g transform="translate(80, 1860)">
    <text class="legend-title" x="0" y="0">Legenda</text>

    <g transform="translate(0, 16)">
      <rect class="room bedroom" x="0" y="0" width="20" height="14"/>
      <text class="legend-text" x="28" y="11">Ložnice / apartmá</text>

      <rect class="room common" x="170" y="0" width="20" height="14"/>
      <text class="legend-text" x="198" y="11">Společné prostory (sál, jídelna)</text>

      <rect class="room service" x="430" y="0" width="20" height="14"/>
      <text class="legend-text" x="458" y="11">Kuchyň</text>

      <rect class="room bar" x="540" y="0" width="20" height="14"/>
      <text class="legend-text" x="568" y="11">Bar</text>

      <rect class="room sauna" x="620" y="0" width="20" height="14"/>
      <text class="legend-text" x="648" y="11">Sauna</text>

      <rect class="room corridor" x="710" y="0" width="20" height="14"/>
      <text class="legend-text" x="738" y="11">Chodba / průchod</text>

      <rect class="room stair" x="870" y="0" width="20" height="14"/>
      <text class="legend-text" x="898" y="11">Schodiště</text>
    </g>
  </g>
</svg>
